<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Econstellar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06090f"/><stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/><stop offset="1" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- constellation: edges between star-nodes -->
  <g stroke="url(#cg)" stroke-width="5" fill="none" opacity="0.5" filter="url(#glow)">
    <path d="M150,160 L256,256 L372,150"/>
    <path d="M256,256 L168,372"/><path d="M256,256 L372,360"/>
  </g>
  <!-- outer star-nodes -->
  <g fill="#00d4ff" opacity="0.9">
    <circle cx="150" cy="160" r="14"/><circle cx="372" cy="150" r="12"/>
    <circle cx="168" cy="372" r="12"/><circle cx="372" cy="360" r="14"/>
  </g>
  <!-- central stellar diamond -->
  <g filter="url(#glow)">
    <path d="M256,150 L350,256 L256,362 L162,256 Z" fill="none" stroke="url(#cg)" stroke-width="20" stroke-linejoin="round"/>
    <path d="M256,210 L298,256 L256,302 L214,256 Z" fill="url(#cg)"/>
  </g>
</svg>
